# v++ config for the F2 (VU47P) build of qwen_decode_kernel.
#
# The connectivity.sp lines are the actionable output of the DRAMsim3 study:
# bind the weight AXI masters to DIFFERENT HBM pseudo-channels so reads stripe
# across channels (channel-interleave), and let the num_read_outstanding in the
# kernel pragmas keep the queues deep. Single-channel binding caps you near 45%
# of peak; spreading across pseudo-channels is what reaches ~92% (424 GB/s).
#
# Used as:  v++ -l --config qwen.cfg ...   (see docs/build_afi.md)

platform=$(AWS_PLATFORM)          # set by the FPGA Dev AMI / aws-fpga env
kernel_frequency=250              # clk_main_a0; the roofline math assumes 250 MHz

[connectivity]
nk=qwen_decode_kernel:1:qwen_cu

# weight masters -> distinct HBM pseudo-channels (stripe the 758 MB stream)
sp=qwen_decode_kernel_1.hbm_w0:HBM[0:3]
sp=qwen_decode_kernel_1.hbm_w1:HBM[4:7]
sp=qwen_decode_kernel_1.hbm_w2:HBM[8:11]
sp=qwen_decode_kernel_1.hbm_w3:HBM[12:15]

# KV cache + outputs on a separate channel group
sp=qwen_decode_kernel_1.kv_hbm:HBM[16:17]
sp=qwen_decode_kernel_1.argmax_out:HBM[16:17]
sp=qwen_decode_kernel_1.logits_out:HBM[16:17]

[vivado]
# leave headroom for timing closure on the fp32 reduction pipelines
prop=run.impl_1.strategy=Performance_ExplorePostRoutePhysOpt
