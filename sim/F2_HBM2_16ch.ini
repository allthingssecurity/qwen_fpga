# AWS F2 (Virtex UltraScale+ HBM, VU47P) HBM2 model for DRAMsim3.
#
# Derived from DRAMsim3's stock configs/HBM2_8Gb_x128.ini, extended to match
# the ACTUAL F2 device on both axes:
#
#   capacity : channel_size 1024 MiB x 16 channels = 16 GiB   == F2's 16 GiB
#   peak BW  : 16 ch x 128 bit x 2 (DDR) / (tCK x 8) = 460 GB/s == AWS's 460 GB/s
#              => tCK = 16*16 B * 2 / 460 GB/s = 1.113 ns
#
# 16 channels = two JEDEC HBM2 8-channel stacks, which is the standard VU47P
# HBM topology. JEDEC HBM2 device timings (CL/tRCD/tRAS/tRFC/...) are kept in
# tCK cycles from the stock config; only tCK (wall-clock per cycle) is tuned so
# aggregate peak lands on AWS's published 460 GB/s. This models a mildly
# derated part rather than inventing timings.
#
# address_mapping = rorabgbachco : column low, channel next. A sequential weight
# stream stays in an open row for 1 KiB before striping to the next channel, so
# channel-level parallelism is bounded by outstanding-request depth -- exactly
# the RTL knob the harness sweeps.

[dram_structure]
protocol = HBM
bankgroups = 4
banks_per_group = 4
rows = 32768
columns = 64
device_width = 128
BL = 4
num_dies = 4

[timing]
tCK = 1.113
CL = 14
CWL = 4
tRCDRD = 14
tRCDWR = 14
tRP = 14
tRAS = 34
tRFC = 260
tREFI = 3900
tREFIb = 128
tRPRE = 1
tWPRE = 1
tRRD_S = 4
tRRD_L = 6
tWTR_S = 6
tWTR_L = 8
tFAW = 30
tWR = 16
tCCD_S = 1
tCCD_L = 2
tXS = 268
tCKE = 8
tCKSRE = 10
tXP = 8
tRTP_L = 6
tRTP_S = 4

[power]
VDD = 1.2
IDD0 = 65
IDD2P = 28
IDD2N = 40
IDD3P = 40
IDD3N = 55
IDD4W = 500
IDD4R = 390
IDD5AB = 250
IDD6x = 31

[system]
channel_size = 1024
channels = 16
bus_width = 128
address_mapping = rorabgbachco
queue_structure = PER_BANK
row_buf_policy = OPEN_PAGE
cmd_queue_size = 8
trans_queue_size = 32
unified_queue = False

[other]
epoch_period = 1000000
output_level = 1
